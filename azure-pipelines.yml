trigger: 
- main

#why is the vmImage ubuntu-latest? Because the Docker task and Azure CLI task used in this pipeline are compatible with Linux agents, and using ubuntu-latest ensures that we have a modern environment with the necessary tools pre-installed. Additionally, using a Linux agent can often lead to faster build times for Docker images compared to Windows agents.
#what other vmImage options are there? Azure Pipelines offers a variety of vmImage options, including:
#- windows-latest: A Windows Server image with the latest updates.
#- ubuntu-latest: An Ubuntu image with the latest updates (commonly used for Docker and Linux-based tasks).
#- macos-latest: A macOS image with the latest updates (used for building and testing macOS applications).
#- windows-2022: A specific version of Windows Server.
#- ubuntu-20.04: A specific version of Ubuntu.
pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: 'amgenpoc'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'
  dockerRegistryServiceConnection: 'amgenPOC-acr-connection'
  # Fill these in to match your Azure resources
  azureServiceConnection: 'amgenPOC-azure-connection'
  containerAppName: 'amgenpoc-app'
  containerAppEnv: 'amgenpoc-env'
  resourceGroup: 'amgenPOC'
  location: 'westus2'
  acrLoginServer: 'amgenpocdocker-g5axeqdhapfbdsa2.azurecr.io'
stages:
#Runs the tests using pytest. It installs the dependencies and then runs the tests in the tests/ directory.
- stage: Test
  displayName: Run Tests
  jobs:
  - job: PyTest
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: 'Use Python 3.11'

    # Install dependencies and run tests using pytest
    - script: pip install -r requirements.txt pytest
      displayName: 'Install dependencies'

      # Run pytest with verbose output and short traceback - what is short traceback? Short traceback is a pytest option that limits the amount of traceback information shown when a test fails. It provides a concise summary of the failure, making it easier to identify the issue without overwhelming the user with too much information. This can be particularly useful in CI/CD pipelines where you want to quickly understand test failures without sifting through extensive logs.
    - script: python -m pytest tests/ -v --tb=short
      displayName: 'Run pytest'

# Builds and pushes the Docker image to ACR in a single job on the same agent.
# Build and Push must run on the same agent — a separate Push stage would get a
# fresh agent with no local image, causing "image does not exist" errors.
- stage: BuildAndPush
  displayName: Build and Push Docker Image
  dependsOn: Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: DockerBuildPush
    steps:
    - script: |
        TAG="$(Build.BuildId)-$(date +%Y%m%d-%H%M%S)"
        echo "##vso[task.setvariable variable=tag]$TAG"
        echo "Tag set to: $TAG"
      displayName: 'Set image tag with timestamp'

    - task: Docker@2
      displayName: 'Build and push image'
      inputs:
        command: buildAndPush
        containerRegistry: '$(dockerRegistryServiceConnection)'
        dockerfile: $(dockerfilePath)
        repository: $(imageRepository)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to Container App
  dependsOn: BuildAndPush
  condition: succeeded()
  jobs:
  - job: DeployContainerApp
    steps:
    - task: AzureCLI@2
      displayName: 'Create or update Container App'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az extension add --name containerapp --upgrade --yes 2>/dev/null || true

          # Get ACR admin credentials (enable admin user if not already on)
          ACR_NAME=$(echo $(acrLoginServer) | cut -d'.' -f1)
          az acr update --name $ACR_NAME --admin-enabled true
          ACR_USERNAME=$(az acr credential show --name $ACR_NAME --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" -o tsv)

          # Create the Container Apps Environment if it doesn't exist
          if ! az containerapp env show \
                --name $(containerAppEnv) \
                --resource-group $(resourceGroup) &>/dev/null; then
            echo "Creating Container Apps Environment"
            az containerapp env create \
              --name $(containerAppEnv) \
              --resource-group $(resourceGroup) \
              --location $(location)
          fi

          if az containerapp show \
               --name $(containerAppName) \
               --resource-group $(resourceGroup) &>/dev/null; then
            echo "Container App exists — updating image"
            az containerapp update \
              --name $(containerAppName) \
              --resource-group $(resourceGroup) \
              --image $(acrLoginServer)/$(imageRepository):latest \
              --registry-server $(acrLoginServer) \
              --registry-username $ACR_USERNAME \
              --registry-password $ACR_PASSWORD
          else
            echo "Container App not found — creating"
            az containerapp create \
              --name $(containerAppName) \
              --resource-group $(resourceGroup) \
              --environment $(containerAppEnv) \
              --image $(acrLoginServer)/$(imageRepository):latest \
              --target-port 8000 \
              --ingress external \
              --registry-server $(acrLoginServer) \
              --registry-username $ACR_USERNAME \
              --registry-password $ACR_PASSWORD \
              --min-replicas 0 \
              --max-replicas 1
          fi
