trigger: none 
#- main


pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: 'amgenpoc'
  dockerfilePath: 'Dockerfile'
  #Add date timesamp in build tag
  #tag: '$(Build.BuildId)'
  tag: '$(Build.BuildId)'
  dockerRegistryServiceConnection: 'amgenPOC-acr-connection'
stages:
#Runs the tests using pytest. It installs the dependencies and then runs the tests in the tests/ directory.
- stage: Test
  displayName: Run Tests
  jobs:
  - job: PyTest
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: 'Use Python 3.11'

    # Install dependencies and run tests using pytest
    - script: pip install -r requirements.txt pytest
      displayName: 'Install dependencies'

      # Run pytest with verbose output and short traceback - what is short traceback? Short traceback is a pytest option that limits the amount of traceback information shown when a test fails. It provides a concise summary of the failure, making it easier to identify the issue without overwhelming the user with too much information. This can be particularly useful in CI/CD pipelines where you want to quickly understand test failures without sifting through extensive logs.
    - script: python -m pytest tests/ -v --tb=short
      displayName: 'Run pytest'

# Builds and pushes the Docker image to ACR in a single job on the same agent.
# Build and Push must run on the same agent — a separate Push stage would get a
# fresh agent with no local image, causing "image does not exist" errors.
- stage: BuildAndPush
  displayName: Build and Push Docker Image
  dependsOn: Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: DockerBuildPush
    steps:
    - script: |
        TAG="$(Build.BuildId)-$(date +%Y%m%d-%H%M%S)"
        echo "##vso[task.setvariable variable=tag]$TAG"
        echo "Tag set to: $TAG"
      displayName: 'Set image tag with timestamp'

    - task: Docker@2
      displayName: 'Build and push image'
      inputs:
        command: buildAndPush
        containerRegistry: '$(dockerRegistryServiceConnection)'
        dockerfile: $(dockerfilePath)
        repository: $(imageRepository)
        tags: |
          $(tag)
          latest
